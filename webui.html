<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ESP32·CAM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg:       #141210;
  --surface:  #1e1b18;
  --raised:   #272320;
  --border:   #332e28;
  --gold:     #c8923a;
  --amber:    #e8b84b;
  --cream:    #f0e8d8;
  --muted:    #6a5f52;
  --red:      #c43828;
  --green:    #4a8a5a;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Crimson Pro', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 0.12em;
  color: var(--amber);
}
.wordmark span { color: var(--muted); font-size: 14px; }
.status-pill {
  display: flex; align-items: center; gap: 8px;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--muted); letter-spacing: 0.1em;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* ── MAIN LAYOUT ── */
.main { display: flex; flex-direction: column; max-width: 560px; margin: 0 auto; padding: 0 0 40px; }

/* ── VIEWFINDER ── */
.viewfinder-wrap {
  position: relative; aspect-ratio: 4/3; background: #0a0806;
  overflow: hidden; cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.viewfinder-wrap::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
  z-index: 2;
}
#preview-img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: filter 0.4s ease;
}
.vf-empty {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; z-index: 1;
}
.vf-empty .icon { font-size: 48px; opacity: 0.15; }
.vf-empty p { font-size: 13px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.08em; }

/* Capture flash */
.flash-overlay {
  position: absolute; inset: 0; background: white; z-index: 10;
  opacity: 0; pointer-events: none; transition: opacity 0.05s;
}
.flash-overlay.active { opacity: 1; }

/* Corner brackets */
.bracket { position: absolute; z-index: 3; width: 20px; height: 20px; }
.bracket.tl { top: 14px; left: 14px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
.bracket.tr { top: 14px; right: 14px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
.bracket.bl { bottom: 14px; left: 14px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
.bracket.br { bottom: 14px; right: 14px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

/* Filter name overlay */
.filter-badge {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em;
  color: var(--amber); padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(200,146,58,0.3); z-index: 4;
  text-transform: uppercase;
}

/* ── FILTER STRIP ── */
.filter-section { padding: 20px 20px 0; }
.section-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase;
  margin-bottom: 14px;
}
.filter-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.filter-btn {
  background: var(--raised); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  outline: none; padding: 0;
}
.filter-btn:hover { border-color: var(--gold); transform: translateY(-1px); }
.filter-btn.active { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }
.filter-swatch {
  height: 52px;
  background: linear-gradient(135deg, #8a7060 0%, #c4a880 40%, #e8c898 70%, #a08060 100%);
}
.filter-label {
  padding: 7px 4px;
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--cream); letter-spacing: 0.08em; text-align: center;
  text-transform: uppercase; line-height: 1;
}

/* ── SHUTTER ROW ── */
.shutter-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 24px 20px;
}
.counter {
  font-family: 'Bebas Neue', sans-serif; font-size: 42px;
  color: var(--gold); line-height: 1; letter-spacing: 0.05em;
  min-width: 60px;
}
.counter-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.12em; margin-top: 2px; }

.shutter-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--raised);
  border: 2px solid var(--gold);
  cursor: pointer; position: relative; outline: none;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 0 0 6px rgba(200,146,58,0.08), inset 0 2px 4px rgba(0,0,0,0.5);
}
.shutter-btn::before {
  content: ''; position: absolute;
  inset: 7px; border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, #e8b84b, #c8923a 60%, #9a6a1a);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
}
.shutter-btn:hover { box-shadow: 0 0 0 10px rgba(200,146,58,0.12), inset 0 2px 4px rgba(0,0,0,0.5); }
.shutter-btn:active { transform: scale(0.93); }
.shutter-btn.firing::before { background: radial-gradient(circle at 38% 35%, #fff8e0, #e8b84b 60%, #c8923a); }

.sd-info {
  min-width: 60px; text-align: right;
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--muted); letter-spacing: 0.1em; line-height: 1.8;
}
.sd-info .val { color: var(--cream); font-size: 13px; }

/* ── GALLERY ── */
.gallery-section { padding: 0 20px; }
.gallery-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin-top: 14px;
}
.thumb-card {
  aspect-ratio: 4/3; background: var(--raised); border-radius: 4px;
  overflow: hidden; cursor: pointer; position: relative;
  border: 1px solid var(--border); transition: border-color 0.2s;
}
.thumb-card:hover { border-color: var(--gold); }
.thumb-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-card .dl-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--amber); letter-spacing: 0.1em;
}
.thumb-card:hover .dl-overlay { opacity: 1; }
.thumb-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 4px 6px; background: rgba(0,0,0,0.7);
  font-family: 'IBM Plex Mono', monospace; font-size: 8px;
  color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gallery-empty {
  grid-column: 1/-1; text-align: center; padding: 40px 0;
  font-size: 13px; color: var(--muted); font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.08em;
}

/* ── LIGHTBOX ── */
#lightbox {
  position: fixed; inset: 0; background: rgba(10,8,6,0.95);
  z-index: 100; display: none; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(8px);
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 100%; max-height: 70vh; object-fit: contain;
  border: 1px solid var(--border); border-radius: 4px;
}
.lb-actions {
  display: flex; gap: 12px; margin-top: 20px;
}
.lb-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
  padding: 10px 24px; border-radius: 4px; cursor: pointer; border: 1px solid;
  text-decoration: none; text-transform: uppercase;
}
.lb-btn.primary { background: var(--gold); color: var(--bg); border-color: var(--gold); }
.lb-btn.ghost   { background: transparent; color: var(--cream); border-color: var(--border); }
.lb-btn.danger  { background: transparent; color: var(--red); border-color: var(--red); }
.lb-name { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 14px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface); border: 1px solid var(--gold);
  color: var(--amber); font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 12px 22px; border-radius: 4px; letter-spacing: 0.1em;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  opacity: 0; z-index: 200; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 24px 20px; }

/* animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.thumb-card { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>

<header>
  <div>
    <div class="wordmark">ESP32·CAM <span>/ OV3660</span></div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">READY</span>
  </div>
</header>

<div class="main">

  <!-- VIEWFINDER -->
  <div class="viewfinder-wrap" id="viewfinder" onclick="handleViewfinderClick()">
    <div class="vf-empty" id="vf-empty">
      <div class="icon">⬡</div>
      <p>NO PHOTO YET</p>
    </div>
    <img id="preview-img" src="" alt="" style="display:none">
    <div class="flash-overlay" id="flash"></div>
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <div class="filter-badge" id="filter-badge">NATURAL</div>
  </div>

  <!-- FILTER STRIP -->
  <div class="filter-section">
    <div class="section-label">— Film Presets</div>
    <div class="filter-strip" id="filter-strip"></div>
  </div>

  <!-- SHUTTER ROW -->
  <div class="shutter-row">
    <div>
      <div class="counter" id="photo-count">000</div>
      <div class="counter-label">FRAMES</div>
    </div>
    <button class="shutter-btn" id="shutter-btn" onclick="capture()" title="Capture"></button>
    <div class="sd-info">
      <div class="val" id="sd-status">—</div>
      <div>SD CARD</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- GALLERY -->
  <div class="gallery-section">
    <div class="section-label">— Roll</div>
    <div class="gallery-grid" id="gallery">
      <div class="gallery-empty">NO EXPOSURES</div>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lb-img" src="" alt="">
  <div class="lb-name" id="lb-name"></div>
  <div class="lb-actions">
    <a id="lb-dl" href="#" class="lb-btn primary" download>DOWNLOAD</a>
    <button class="lb-btn ghost" onclick="closeLightbox()">CLOSE</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// FILTER DEFINITIONS
// CSS filter = live preview on last photo
// sensor = OV3660 register changes sent to /filter endpoint
// ============================================================
const FILTERS = [
  {
    id: 'natural',
    name: 'Natural',
    css: 'none',
    swatch: 'linear-gradient(135deg,#8a7060,#c4a880 40%,#e8c898 70%,#a08060)',
    sensor: { brightness:1, saturation:0, contrast:0, special_effect:0 }
  },
  {
    id: 'kodak',
    name: 'Kodak',
    css: 'sepia(0.25) saturate(1.4) contrast(1.08) brightness(1.05)',
    swatch: 'linear-gradient(135deg,#9a7050,#d4a870 40%,#f0d090 70%,#b08050)',
    sensor: { brightness:1, saturation:2, contrast:1, special_effect:0 }
  },
  {
    id: 'ilford',
    name: 'Ilford',
    css: 'grayscale(1) contrast(1.15) brightness(1.05)',
    swatch: 'linear-gradient(135deg,#2a2a2a,#888 40%,#ccc 70%,#555)',
    sensor: { brightness:0, saturation:-2, contrast:2, special_effect:2 }
  },
  {
    id: 'velvia',
    name: 'Velvia',
    css: 'saturate(1.9) contrast(1.12) brightness(0.97)',
    swatch: 'linear-gradient(135deg,#6a3020,#d06030 40%,#e8b040 70%,#205050)',
    sensor: { brightness:0, saturation:2, contrast:2, special_effect:0 }
  },
  {
    id: 'fade',
    name: 'Faded',
    css: 'sepia(0.4) saturate(0.7) contrast(0.85) brightness(1.15)',
    swatch: 'linear-gradient(135deg,#b09880,#d8c4a8 40%,#ede0c8 70%,#c0a888)',
    sensor: { brightness:2, saturation:-1, contrast:-1, special_effect:0 }
  },
  {
    id: 'cool',
    name: 'Cyanotype',
    css: 'sepia(0.5) hue-rotate(180deg) saturate(1.3) contrast(1.1)',
    swatch: 'linear-gradient(135deg,#102040,#204880 40%,#4080c0 70%,#183060)',
    sensor: { brightness:0, saturation:1, contrast:1, special_effect:0 }
  },
  {
    id: 'redscale',
    name: 'Redscale',
    css: 'sepia(1) hue-rotate(-20deg) saturate(2.5) contrast(1.1) brightness(0.95)',
    swatch: 'linear-gradient(135deg,#6a1008,#c82010 40%,#e86020 70%,#902008)',
    sensor: { brightness:0, saturation:2, contrast:1, special_effect:0 }
  },
  {
    id: 'xpro',
    name: 'X-Pro',
    css: 'saturate(1.6) contrast(1.2) brightness(0.9) hue-rotate(8deg)',
    swatch: 'linear-gradient(135deg,#203828,#408050 40%,#80c878 70%,#305840)',
    sensor: { brightness:-1, saturation:2, contrast:2, special_effect:0 }
  },
];

// ============================================================
// STATE
// ============================================================
let activeFilter = FILTERS[0];
let photoCount   = 0;
let lastPhoto    = null;
let lightboxFile = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderFilters();
  loadGallery();
  setInterval(loadGallery, 15000);
});

// ============================================================
// FILTERS
// ============================================================
function renderFilters() {
  const strip = document.getElementById('filter-strip');
  strip.innerHTML = FILTERS.map((f, i) => `
    <button class="filter-btn ${i===0?'active':''}" onclick="selectFilter(${i})" title="${f.name}">
      <div class="filter-swatch" style="background:${f.swatch}; filter:${f.css==='none'?'':f.css}"></div>
      <div class="filter-label">${f.name}</div>
    </button>
  `).join('');
}

function selectFilter(idx) {
  activeFilter = FILTERS[idx];

  // Update UI
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.getElementById('filter-badge').textContent = activeFilter.name.toUpperCase();

  // Apply CSS filter to preview
  const img = document.getElementById('preview-img');
  img.style.filter = activeFilter.css;

  // Send sensor settings to ESP32
  const p = activeFilter.sensor;
  fetch(`/filter?brightness=${p.brightness}&saturation=${p.saturation}&contrast=${p.contrast}&effect=${p.special_effect}`)
    .catch(() => {});

  showToast(activeFilter.name.toUpperCase() + ' SELECTED');
}

// ============================================================
// CAPTURE
// ============================================================
async function capture() {
  const btn   = document.getElementById('shutter-btn');
  const flash = document.getElementById('flash');
  btn.classList.add('firing');
  flash.classList.add('active');
  setStatus('CAPTURING', '#e8b84b');

  setTimeout(() => { flash.classList.remove('active'); btn.classList.remove('firing'); }, 180);

  try {
    const r = await fetch('/capture');
    const d = await r.json();
    if (d.ok) {
      photoCount++;
      document.getElementById('photo-count').textContent = String(photoCount).padStart(3,'0');
      showPreview('/photo?name=' + encodeURIComponent(d.path.split('/').pop()));
      lastPhoto = d.path.split('/').pop();
      showToast('FRAME ' + String(photoCount).padStart(3,'0') + ' SAVED');
      loadGallery();
    } else {
      showToast('CAPTURE FAILED');
    }
  } catch(e) {
    showToast('CONNECTION ERROR');
  }
  setStatus('READY', 'var(--green)');
}

function showPreview(src) {
  const img   = document.getElementById('preview-img');
  const empty = document.getElementById('vf-empty');
  img.onload = () => { img.style.display = 'block'; empty.style.display = 'none'; };
  img.src    = src;
  img.style.filter = activeFilter.css;
}

function handleViewfinderClick() {
  if (lastPhoto) openLightbox(lastPhoto);
}

// ============================================================
// GALLERY
// ============================================================
async function loadGallery() {
  try {
    const r     = await fetch('/list');
    const files = await r.json();
    photoCount  = files.length;
    document.getElementById('photo-count').textContent = String(photoCount).padStart(3,'0');
    document.getElementById('sd-status').textContent   = files.length + ' FILES';

    const g = document.getElementById('gallery');
    if (!files.length) {
      g.innerHTML = '<div class="gallery-empty">NO EXPOSURES</div>';
      return;
    }
    g.innerHTML = [...files].reverse().map((f,i) => `
      <div class="thumb-card" onclick="openLightbox('${f}')" style="animation-delay:${i*0.04}s">
        <img src="/photo?name=${encodeURIComponent(f)}" alt="${f}" loading="lazy">
        <div class="dl-overlay">↓ SAVE</div>
        <div class="thumb-name">${f}</div>
      </div>
    `).join('');

    if (files.length > 0 && !lastPhoto) {
      lastPhoto = files[files.length-1];
      showPreview('/photo?name=' + encodeURIComponent(lastPhoto));
    }
  } catch(e) {}
}

// ============================================================
// LIGHTBOX
// ============================================================
function openLightbox(filename) {
  lightboxFile = filename;
  const lb  = document.getElementById('lightbox');
  const img = document.getElementById('lb-img');
  const dl  = document.getElementById('lb-dl');
  document.getElementById('lb-name').textContent = filename;
  img.src  = '/photo?name=' + encodeURIComponent(filename);
  dl.href  = '/photo?name=' + encodeURIComponent(filename) + '&dl=1';
  dl.download = filename;
  lb.classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// ============================================================
// STATUS / TOAST
// ============================================================
function setStatus(text, color) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').style.background = color || 'var(--green)';
  document.getElementById('status-dot').style.boxShadow  = `0 0 6px ${color || 'var(--green)'}`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
